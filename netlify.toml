[build]
  command = "pnpm generate"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22"

# SPA catch-all — all routes served by index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — no framing allowed
    X-Frame-Options = "DENY"

    # Prevent MIME-type sniffing attacks
    X-Content-Type-Options = "nosniff"

    # Control referrer leakage
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Disable unnecessary browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), autoplay=(), encrypted-media=(), picture-in-picture=(), display-capture=()"

    # Force HTTPS (Netlify handles TLS, but belt + suspenders)
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Prevent cross-origin info leaks
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Resource-Policy = "same-origin"

    # Block XSS reflection attacks (legacy browsers)
    X-XSS-Protection = "1; mode=block"

    # CSP — strict as possible for a client-side SPA
    # - No external scripts, no eval needed (Nuxt prebuilds everything)
    # - Inline styles required by Vue/Nuxt UI runtime
    # - Fonts from Google Fonts (auto-downloaded by @nuxt/fonts, served locally in prod)
    # - Iconify API for icon loading
    # - blob: for Web Worker creation
    # - data: for inline SVG/font references
    Content-Security-Policy = "default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.iconify.design; worker-src 'self' blob:; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests"

# Cache static assets aggressively
[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
