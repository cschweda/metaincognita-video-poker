<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="40" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14" text-anchor="middle" font-weight="600" letter-spacing="2">THE PAY TABLE DIFFERENCE</text>

  <!-- Machine 1: 9/6 Full Pay -->
  <g transform="translate(100, 65)">
    <!-- Machine frame -->
    <rect x="0" y="0" width="440" height="380" rx="12" fill="#12122a" stroke="#4ade80" stroke-width="2"/>
    <rect x="12" y="12" width="416" height="30" rx="4" fill="rgba(74, 222, 128, 0.1)"/>
    <text x="220" y="32" fill="#4ade80" font-family="'Fira Code', monospace" font-size="13" text-anchor="middle" font-weight="700">9/6 JACKS OR BETTER — FULL PAY</text>

    <!-- Pay table rows -->
    <g font-family="'Fira Code', monospace" font-size="12">
      <text x="24" y="70" fill="#94a3b8">Royal Flush</text><text x="380" y="70" fill="#e2e8f0" text-anchor="end">4000</text>
      <text x="24" y="92" fill="#94a3b8">Straight Flush</text><text x="380" y="92" fill="#e2e8f0" text-anchor="end">250</text>
      <text x="24" y="114" fill="#94a3b8">Four of a Kind</text><text x="380" y="114" fill="#e2e8f0" text-anchor="end">125</text>
      <!-- THE KEY ROWS -->
      <rect x="16" y="121" width="408" height="22" rx="3" fill="rgba(74, 222, 128, 0.12)"/>
      <text x="24" y="137" fill="#4ade80" font-weight="700">Full House</text><text x="380" y="137" fill="#4ade80" text-anchor="end" font-weight="700">45</text>
      <rect x="16" y="143" width="408" height="22" rx="3" fill="rgba(74, 222, 128, 0.08)"/>
      <text x="24" y="159" fill="#4ade80" font-weight="700">Flush</text><text x="380" y="159" fill="#4ade80" text-anchor="end" font-weight="700">30</text>
      <text x="24" y="181" fill="#94a3b8">Straight</text><text x="380" y="181" fill="#e2e8f0" text-anchor="end">20</text>
      <text x="24" y="203" fill="#94a3b8">Three of a Kind</text><text x="380" y="203" fill="#e2e8f0" text-anchor="end">15</text>
      <text x="24" y="225" fill="#94a3b8">Two Pair</text><text x="380" y="225" fill="#e2e8f0" text-anchor="end">10</text>
      <text x="24" y="247" fill="#94a3b8">Jacks or Better</text><text x="380" y="247" fill="#e2e8f0" text-anchor="end">5</text>
    </g>

    <!-- Return -->
    <text x="220" y="285" fill="#4ade80" font-family="'Fira Code', monospace" font-size="18" text-anchor="middle" font-weight="700" filter="url(#glow)">Return: 99.54%</text>
    <text x="220" y="305" fill="#4ade80" font-family="system-ui" font-size="11" text-anchor="middle" opacity="0.7">House edge: 0.46%</text>

    <!-- Verdict -->
    <rect x="130" y="320" width="180" height="32" rx="6" fill="rgba(74, 222, 128, 0.15)" stroke="#4ade80" stroke-width="1"/>
    <text x="220" y="341" fill="#4ade80" font-family="'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">PLAY THIS ONE</text>
  </g>

  <!-- Machine 2: 8/5 Short Pay -->
  <g transform="translate(660, 65)">
    <!-- Machine frame -->
    <rect x="0" y="0" width="440" height="380" rx="12" fill="#12122a" stroke="#f87171" stroke-width="2"/>
    <rect x="12" y="12" width="416" height="30" rx="4" fill="rgba(248, 113, 113, 0.1)"/>
    <text x="220" y="32" fill="#f87171" font-family="'Fira Code', monospace" font-size="13" text-anchor="middle" font-weight="700">8/5 JACKS OR BETTER — SHORT PAY</text>

    <!-- Pay table rows -->
    <g font-family="'Fira Code', monospace" font-size="12">
      <text x="24" y="70" fill="#94a3b8">Royal Flush</text><text x="380" y="70" fill="#e2e8f0" text-anchor="end">4000</text>
      <text x="24" y="92" fill="#94a3b8">Straight Flush</text><text x="380" y="92" fill="#e2e8f0" text-anchor="end">250</text>
      <text x="24" y="114" fill="#94a3b8">Four of a Kind</text><text x="380" y="114" fill="#e2e8f0" text-anchor="end">125</text>
      <!-- THE KEY ROWS — DIFFERENT -->
      <rect x="16" y="121" width="408" height="22" rx="3" fill="rgba(248, 113, 113, 0.12)"/>
      <text x="24" y="137" fill="#f87171" font-weight="700">Full House</text><text x="380" y="137" fill="#f87171" text-anchor="end" font-weight="700">40</text>
      <text x="300" y="137" fill="#f87171" text-anchor="end" font-size="10" opacity="0.7">&#x2193; was 45</text>
      <rect x="16" y="143" width="408" height="22" rx="3" fill="rgba(248, 113, 113, 0.08)"/>
      <text x="24" y="159" fill="#f87171" font-weight="700">Flush</text><text x="380" y="159" fill="#f87171" text-anchor="end" font-weight="700">25</text>
      <text x="300" y="159" fill="#f87171" text-anchor="end" font-size="10" opacity="0.7">&#x2193; was 30</text>
      <text x="24" y="181" fill="#94a3b8">Straight</text><text x="380" y="181" fill="#e2e8f0" text-anchor="end">20</text>
      <text x="24" y="203" fill="#94a3b8">Three of a Kind</text><text x="380" y="203" fill="#e2e8f0" text-anchor="end">15</text>
      <text x="24" y="225" fill="#94a3b8">Two Pair</text><text x="380" y="225" fill="#e2e8f0" text-anchor="end">10</text>
      <text x="24" y="247" fill="#94a3b8">Jacks or Better</text><text x="380" y="247" fill="#e2e8f0" text-anchor="end">5</text>
    </g>

    <!-- Return -->
    <text x="220" y="285" fill="#f87171" font-family="'Fira Code', monospace" font-size="18" text-anchor="middle" font-weight="700">Return: 97.30%</text>
    <text x="220" y="305" fill="#f87171" font-family="system-ui" font-size="11" text-anchor="middle" opacity="0.7">House edge: 2.70%</text>

    <!-- Cost -->
    <rect x="90" y="320" width="260" height="32" rx="6" fill="rgba(248, 113, 113, 0.15)" stroke="#f87171" stroke-width="1"/>
    <text x="220" y="341" fill="#f87171" font-family="'Fira Code', monospace" font-size="12" text-anchor="middle" font-weight="700">COSTS YOU $28/HOUR</text>
  </g>

  <!-- Center arrow + difference -->
  <g transform="translate(555, 220)">
    <text x="45" y="0" fill="#fbbf24" font-family="system-ui" font-size="28" text-anchor="middle" font-weight="700">&#x2194;</text>
    <text x="45" y="24" fill="#fbbf24" font-family="'Fira Code', monospace" font-size="11" text-anchor="middle" font-weight="700">2.24%</text>
    <text x="45" y="40" fill="#64748b" font-family="system-ui" font-size="10" text-anchor="middle">difference</text>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="478" fill="#475569" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">
    Two numbers changed. Same cabinet. Same screen. $5,600/year at typical play speed.
  </text>
</svg>
